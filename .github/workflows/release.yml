name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            bin_editor: robost-editor
            bin_cli: rpa
            archive_editor: robost-editor-aarch64-apple-darwin.tar.gz
            archive_cli: rpa-aarch64-apple-darwin.tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            bin_editor: robost-editor
            bin_cli: rpa
            archive_editor: robost-editor-x86_64-apple-darwin.tar.gz
            archive_cli: rpa-x86_64-apple-darwin.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin_editor: robost-editor.exe
            bin_cli: rpa.exe
            archive_editor: robost-editor-x86_64-windows.zip
            archive_cli: rpa-x86_64-windows.zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: release-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: release-${{ matrix.target }}-

      - name: Build robost-editor
        run: cargo build -p robost-editor --release --target ${{ matrix.target }}

      - name: Build robost-cli
        run: cargo build -p robost-cli --release --target ${{ matrix.target }}

      - name: Package (macOS)
        if: runner.os == 'macOS'
        env:
          TARGET: ${{ matrix.target }}
          BIN_EDITOR: ${{ matrix.bin_editor }}
          BIN_CLI: ${{ matrix.bin_cli }}
          ARCHIVE_EDITOR: ${{ matrix.archive_editor }}
          ARCHIVE_CLI: ${{ matrix.archive_cli }}
        run: |
          tar czf "$ARCHIVE_EDITOR" -C "target/$TARGET/release" "$BIN_EDITOR"
          tar czf "$ARCHIVE_CLI"   -C "target/$TARGET/release" "$BIN_CLI"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          TARGET: ${{ matrix.target }}
          BIN_EDITOR: ${{ matrix.bin_editor }}
          BIN_CLI: ${{ matrix.bin_cli }}
          ARCHIVE_EDITOR: ${{ matrix.archive_editor }}
          ARCHIVE_CLI: ${{ matrix.archive_cli }}
        run: |
          Compress-Archive -Path "target\$env:TARGET\release\$env:BIN_EDITOR" `
            -DestinationPath $env:ARCHIVE_EDITOR
          Compress-Archive -Path "target\$env:TARGET\release\$env:BIN_CLI" `
            -DestinationPath $env:ARCHIVE_CLI

      - name: Upload editor artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive_editor }}
          path: ${{ matrix.archive_editor }}

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive_cli }}
          path: ${{ matrix.archive_cli }}

  release:
    name: Create release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: artifacts/**
