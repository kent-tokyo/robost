name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            bin: rpa
            archive: rpa-aarch64-apple-darwin.tar.gz

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: rpa.exe
            archive: rpa-x86_64-windows.zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: release-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: release-${{ matrix.target }}-

      # ── macOS: Tesseract via Homebrew ──────────────────────────────────────
      - name: Install OCR deps (macOS)
        if: runner.os == 'macOS'
        run: brew install pkgconf tesseract tesseract-lang

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Build rpa (macOS)
        if: runner.os == 'macOS'
        run: cargo build -p robost-cli --release --features ocr --target ${{ matrix.target }}

      # ── Windows: build web editor then embed into rpa.exe ─────────────────
      - name: Setup Node.js (Windows)
        if: runner.os == 'Windows'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web-editor/package-lock.json

      - name: Build web editor (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-Location apps/web-editor
          npm ci
          npm run build

      # Windows uses built-in WinRT OCR (Windows.Media.Ocr) — no Tesseract/vcpkg needed.
      # Language packs: Settings > Time & Language > Language & Region > Add a language
      #   then install the "Optical character recognition" optional feature.
      - name: Build rpa.exe (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cargo build -p robost-cli --release --features windows-ocr,embed-editor --target ${{ matrix.target }}

      # ── Package macOS ──────────────────────────────────────────────────────
      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          tar czf "${{ matrix.archive }}" \
            -C "target/${{ matrix.target }}/release" "${{ matrix.bin }}"

      # ── Package Windows ────────────────────────────────────────────────────
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $rel = "target\${{ matrix.target }}\release"
          $files = @(
            "$rel\${{ matrix.bin }}",
            "run.bat",
            "stop.bat",
            "install_deps.bat",
            "setup_build_env.bat"
          )
          Compress-Archive -Path $files -DestinationPath "${{ matrix.archive }}" -Force

      - name: Build installer (Windows)
        if: runner.os == 'Windows' && startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          REF_NAME: ${{ github.ref_name }}
          BUILD_TARGET: ${{ matrix.target }}
        run: |
          $env:APP_VERSION = $env:REF_NAME -replace '^v', ''
          $rpaExe = "target\$env:BUILD_TARGET\release\rpa.exe"
          iscc "/DAppVersion=$env:APP_VERSION" "/DRpaExe=$rpaExe" installer\robost-setup.iss

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

      - name: Upload installer artifact (Windows)
        if: runner.os == 'Windows' && startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: robost-setup
          path: installer/output/robost-setup.exe

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: artifacts/**
