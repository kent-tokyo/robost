name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            bin: rpa
            archive: rpa-aarch64-apple-darwin.tar.gz

          - os: macos-13
            target: x86_64-apple-darwin
            bin: rpa
            archive: rpa-x86_64-apple-darwin.tar.gz

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: rpa.exe
            archive: rpa-x86_64-windows.zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: release-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: release-${{ matrix.target }}-

      # ── macOS: Tesseract via Homebrew ──────────────────────────────────────
      - name: Install OCR deps (macOS)
        if: runner.os == 'macOS'
        run: brew install pkgconf tesseract tesseract-lang

      # ── Windows: Tesseract + Leptonica via vcpkg ──────────────────────────
      - name: Cache vcpkg packages
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: C:\vcpkg\installed
          key: vcpkg-tesseract-x64-windows-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: vcpkg-tesseract-x64-windows-

      - name: Install OCR deps (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install pkgconfiglite --no-progress -y
          & "C:\vcpkg\vcpkg.exe" install leptonica:x64-windows tesseract:x64-windows

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Build rpa (macOS)
        if: runner.os == 'macOS'
        run: cargo build -p robost-cli --release --features ocr --target ${{ matrix.target }}

      - name: Build rpa.exe (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          PKG_CONFIG_PATH: C:\vcpkg\installed\x64-windows\lib\pkgconfig
          VCPKGRS_DYNAMIC: "1"
        run: cargo build -p robost-cli --release --features ocr --target ${{ matrix.target }}

      # ── Package macOS ──────────────────────────────────────────────────────
      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          tar czf "${{ matrix.archive }}" \
            -C "target/${{ matrix.target }}/release" "${{ matrix.bin }}"

      # ── Package Windows (bundle DLLs so OCR works without extra install) ──
      - name: Collect DLLs (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $out = "target\${{ matrix.target }}\release"
          $vcpkgBin = "C:\vcpkg\installed\x64-windows\bin"
          $patterns = @(
            "tesseract*.dll", "leptonica*.dll",
            "libpng*.dll", "zlib1.dll", "jpeg*.dll",
            "tiff*.dll", "giflib*.dll", "lzma.dll",
            "openjp2.dll", "webp*.dll"
          )
          foreach ($pat in $patterns) {
            Get-ChildItem "$vcpkgBin\$pat" -ErrorAction SilentlyContinue |
              Copy-Item -Destination $out -Force
          }

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $rel = "target\${{ matrix.target }}\release"
          $files = @("$rel\${{ matrix.bin }}") +
                   (Get-ChildItem "$rel\*.dll" | Select-Object -ExpandProperty FullName) +
                   @("run.bat", "stop.bat", "install_deps.bat")
          Compress-Archive -Path $files -DestinationPath "${{ matrix.archive }}" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: artifacts/**
