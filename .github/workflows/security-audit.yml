name: Security audit

on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    - cron: "17 18 * * 1" # Tuesday 03:17 JST

permissions:
  contents: read

jobs:
  cargo-audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run cargo audit
        run: cargo audit

  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web-editor
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web-editor/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=high
