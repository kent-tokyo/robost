name: CodeQL

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "23 18 * * 0" # Monday 03:23 JST

permissions:
  security-events: write
  packages: read
  actions: read
  contents: read

jobs:
  analyze-js:
    name: CodeQL (javascript-typescript)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-extended
          build-mode: none
      - uses: github/codeql-action/analyze@v3

  analyze-rust:
    name: CodeQL (rust)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            pkg-config libglib2.0-dev libgtk-3-dev libssl-dev clang \
            libxdo-dev libdbus-1-dev libsecret-1-dev libxkbcommon-dev \
            libasound2-dev libfontconfig1-dev libpipewire-0.3-dev \
            libspa-0.2-dev libgbm-dev

      - uses: github/codeql-action/init@v3
        with:
          languages: rust
          queries: security-extended
          build-mode: manual

      - name: Build
        run: cargo build --workspace

      - uses: github/codeql-action/analyze@v3
