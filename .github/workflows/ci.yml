name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Reject path deps that escape the workspace (they break CI on fresh checkouts).
  # All external crates must use git = or version = instead.
  check-external-path-deps:
    name: Check no external path deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Reject path deps escaping the workspace
        shell: bash
        run: |
          bad=$(grep -rn 'path = "\.\./\.\./' crates/*/Cargo.toml || true)
          if [ -n "$bad" ]; then
            echo "ERROR: path dependency escaping the workspace:"
            echo "$bad"
            echo "Use git = or version = for dependencies outside this repo."
            exit 1
          fi
          echo "OK: no external path dependencies found."
      - name: Reject Win32::Foundation::BOOL import (moved to windows::core in 0.61)
        shell: bash
        run: |
          bad=$(grep -rn 'Foundation.*\bBOOL\b' crates/*/src/ || true)
          if [ -n "$bad" ]; then
            echo "ERROR: BOOL imported from Win32::Foundation; use windows::core::BOOL instead:"
            echo "$bad"
            exit 1
          fi
          echo "OK: no Win32::Foundation::BOOL imports."

  build-and-test:
    needs: check-external-path-deps
    name: build + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v7

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libglib2.0-dev \
            libgtk-3-dev \
            libssl-dev \
            clang \
            libtesseract-dev \
            libleptonica-dev \
            libxdo-dev \
            libdbus-1-dev \
            libsecret-1-dev \
            libxkbcommon-dev \
            libasound2-dev \
            libfontconfig1-dev \
            libpipewire-0.3-dev \
            libspa-0.2-dev \
            libgbm-dev \
            xvfb

      - name: Build workspace
        run: cargo build --workspace

      - name: Run tests
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            xvfb-run -a cargo test --workspace
          else
            cargo test --workspace
          fi
        shell: bash

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Fmt check
        run: cargo fmt --all --check

  # Coverage visibility only — not a merge gate. ubuntu-only since running it
  # across all 3 OSes would triple the cost for no extra signal.
  coverage:
    name: coverage (informational)
    needs: check-external-path-deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ubuntu-coverage-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ubuntu-coverage-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libglib2.0-dev \
            libgtk-3-dev \
            libssl-dev \
            clang \
            libtesseract-dev \
            libleptonica-dev \
            libxdo-dev \
            libdbus-1-dev \
            libsecret-1-dev \
            libxkbcommon-dev \
            libasound2-dev \
            libfontconfig1-dev \
            libpipewire-0.3-dev \
            libspa-0.2-dev \
            libgbm-dev \
            xvfb

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: Generate coverage report
        run: xvfb-run -a cargo llvm-cov --workspace --summary-only --lcov --output-path lcov.info

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: lcov.info
          path: lcov.info

  validate-embed-editor:
    name: Validate embed-editor feature
    needs: check-external-path-deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ubuntu-embed-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ubuntu-embed-

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            pkg-config libglib2.0-dev libgtk-3-dev libssl-dev clang \
            libxdo-dev libdbus-1-dev libsecret-1-dev libxkbcommon-dev \
            libasound2-dev libfontconfig1-dev libpipewire-0.3-dev \
            libspa-0.2-dev libgbm-dev

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web-editor/package-lock.json

      - name: Build web editor
        working-directory: apps/web-editor
        run: npm ci && npm run build

      - name: Build robost-cli with embed-editor
        run: cargo build -p robost-cli --features embed-editor
