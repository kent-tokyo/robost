name: "notepad_demo"
steps:
  - shell: { cmd: "notepad.exe" }
  - wait_ms: 1000
  - window_control: { title_contains: "メモ帳", action: focus }
  - type: "robost で自動入力しました。\nWindows RPA — ビルド不要。"
  - press: "ctrl+a"
  - press: "ctrl+c"
  - log_write: { file: "notepad_run.log", message: "クリップボードにコピーしました" }
  - press: "ctrl+z"
  - press: "ctrl+z"
  - window_control: { title_contains: "メモ帳", action: close }
