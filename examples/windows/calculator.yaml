name: "calculator_demo"
steps:
  - shell: { cmd: "calc.exe" }
  - wait_ms: 1000
  - uia_wait: { window: "電卓", by: !name "1", state: enabled, timeout_ms: 5000 }
  - uia_click: { window: "電卓", by: !name "1" }
  - uia_click: { window: "電卓", by: !name "2" }
  - uia_click: { window: "電卓", by: !name "プラス" }
  - uia_click: { window: "電卓", by: !name "3" }
  - uia_click: { window: "電卓", by: !name "4" }
  - uia_click: { window: "電卓", by: !name "等号" }
  - uia_get:
      window: "電卓"
      by: !id "CalculatorResults"
      property: name
      save_as: result
  - log_write: { file: "calc_run.log", message: "12 + 34 = {{ result }}" }
  - window_control: { title_contains: "電卓", action: close }
